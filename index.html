<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện tập GDKT & Pháp luật AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 650px; margin: 30px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: var(--primary); text-align: center; font-size: 22px; }
        .setup-section { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #e2e8f0; }
        select, button { padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; opacity: 0.9; }
        button:disabled { background: #cbd5e1; cursor: not-allowed; }
        .quiz-card { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question-text { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: #0f172a; }
        .option { display: block; margin: 10px 0; padding: 14px; border: 2px solid #f1f5f9; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: #bfdbfe; background: #eff6ff; }
        .option.selected { border-color: var(--primary); background: #eff6ff; }
        .explanation { display: none; margin-top: 20px; padding: 15px; background: #f0fdf4; border-radius: 10px; border-left: 4px solid #22c55e; }
        .error-msg { color: #ef4444; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Luyện tập GDKT & Pháp luật AI</h1>
    
    <div class="setup-section">
        <label style="font-weight: 600;">Chọn chủ đề bài học:</label>
        <select id="topic">
            <option value="Cung cầu trong kinh tế thị trường">Cung - Cầu trong kinh tế</option>
            <option value="Thị trường lao động và việc làm">Thị trường lao động & việc làm</option>
            <option value="Hệ thống pháp luật Việt Nam">Hệ thống Pháp luật Việt Nam</option>
            <option value="Hiến pháp nước CHXHCN Việt Nam">Hiến pháp Việt Nam</option>
            <option value="Quyền và nghĩa vụ của công dân">Quyền & Nghĩa vụ công dân</option>
        </select>
        <button id="gen-btn" onclick="generateQuestion()">Tạo câu hỏi từ AI</button>
        <div id="error-box" class="error-msg"></div>
    </div>

    <div id="quiz-container" class="quiz-card">
        <div class="question-text" id="question-text"></div>
        <div id="options-container"></div>
        
        <button id="check-btn" onclick="showExplanation()" style="display:none; width: 100%; margin-top:20px; background: #64748b;">
            Xem Giải thích
        </button>
        
        <div id="explanation-box" class="explanation">
            <b style="color: #16a34a;">Giải thích:</b> <span id="explanation-text"></span>
        </div>
    </div>
</div>

<script>
    /** * HƯỚNG DẪN: 
     * 1. Dán API Key của bạn vào giữa hai dấu ngoặc kép ở dòng dưới.
     * 2. Lưu file với định dạng UTF-8.
     */
    const API_KEY = "AIzaSyD9cNpoJslhCkt1C0Db_ITQbHfZVPaGjok"; 

    async function generateQuestion() {
        const topic = document.getElementById('topic').value;
        const genBtn = document.getElementById('gen-btn');
        const container = document.getElementById('quiz-container');
        const optionsBox = document.getElementById('options-container');
        const errorBox = document.getElementById('error-box');
        
        // Trạng thái chờ
        genBtn.disabled = true;
        genBtn.innerText = "Đang kết nối AI...";
        errorBox.style.display = "none";
        container.style.display = "none";
        document.getElementById('explanation-box').style.display = "none";

        const prompt = `Bạn là chuyên gia giáo dục môn Kinh tế Pháp luật lớp 10, 11, 12 tại Việt Nam. 
        Hãy tạo 1 câu hỏi trắc nghiệm về chủ đề: "${topic}". 
        Trả về DUY NHẤT định dạng JSON thô (không có dấu nháy và chữ json), gồm các trường:
        question: nội dung câu hỏi,
        options: mảng 4 đáp án,
        correct: số từ 0 đến 3 ứng với vị trí đáp án đúng,
        explanation: giải thích ngắn gọn vì sao đúng.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            let text = data.candidates[0].content.parts[0].text;
            // Làm sạch chuỗi JSON
            text = text.replace(/```json/g, "").replace(/```/g, "").trim();
            const quiz = JSON.parse(text);

            // Hiển thị dữ liệu
            document.getElementById('question-text').innerText = quiz.question;
            optionsBox.innerHTML = "";
            quiz.options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => selectOption(div, index, quiz.correct);
                optionsBox.appendChild(div);
            });
            document.getElementById('explanation-text').innerText = quiz.explanation;
            
            container.style.display = 'block';
        } catch (err) {
            errorBox.innerText = "Lỗi: " + err.message + ". Hãy kiểm tra API Key và Internet.";
            errorBox.style.display = "block";
            console.error(err);
        } finally {
            genBtn.disabled = false;
            genBtn.innerText = "Tạo câu hỏi từ AI";
        }
    }

    function selectOption(el, idx, correctIdx) {
        const opts = document.querySelectorAll('.option');
        opts.forEach(o => { o.style.background = "white"; o.style.borderColor = "#f1f5f9"; });
        
        el.style.borderColor = (idx === correctIdx) ? "#22c55e" : "#ef4444";
        el.style.background = (idx === correctIdx) ? "#dcfce7" : "#fee2e2";
        
        document.getElementById('check-btn').style.display = 'block';
    }

    function showExplanation() {
        document.getElementById('explanation-box').style.display = 'block';
    }
</script>

</body>
</html>
